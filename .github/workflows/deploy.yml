name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/jax-hcm:${{ steps.meta.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/jax-hcm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy notification (stub)
        run: |
          echo "✅ Image ${{ steps.meta.outputs.VERSION }} pushed."
          echo "Configure SSH deploy step or webhook here for your target server."
